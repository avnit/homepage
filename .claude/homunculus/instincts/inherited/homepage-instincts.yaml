# Homepage Workflow Add New Widget Service

## Action

Follow the add-new-widget-service workflow:
1. Create or update documentation for the new widget in docs/widgets/services/{widget}.md
2. Update docs/widgets/services/index.md to include the new widget
3. Update mkdocs.yml to register the new documentation page
4. Update public/locales/en/common.json for localization
5. Update src/utils/config/service-helpers.js to add service config helpers
6. Add new widget implementation files: src/widgets/{widget}/component.jsx, src/widgets/{widget}/widget.js (and optionally proxy.js)
7. Update src/widgets/components.js and src/widgets/widgets.js to register the new widget
8. Add tests: src/widgets/{widget}/component.test.jsx, src/widgets/{widget}/widget.test.js

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: docs/widgets/services/{widget}.md, docs/widgets/services/index.md, mkdocs.yml

